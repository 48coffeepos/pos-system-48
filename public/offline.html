<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Offline - 48 Coffee POS</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
					Oxygen, Ubuntu, sans-serif;
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100dvh;
				background: #fafaf9;
				color: #292524;
				padding: 1.5rem;
			}
			.container {
				text-align: center;
				max-width: 24rem;
			}
			h1 {
				font-size: 1.5rem;
				font-weight: 700;
				margin-bottom: 0.5rem;
			}
			p {
				color: #78716c;
				line-height: 1.6;
				margin-bottom: 1.5rem;
			}
			button {
				padding: 0.75rem 2rem;
				border: none;
				border-radius: 0.5rem;
				background: #4fb8b2;
				color: #fff;
				font-size: 0.875rem;
				font-weight: 600;
				cursor: pointer;
				transition: background 0.15s;
			}
			button:hover {
				background: #3d9e98;
			}
			@media (prefers-color-scheme: dark) {
				body {
					background: #1c1917;
					color: #e7e5e4;
				}
				p {
					color: #a8a29e;
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<img
				src="/logo512.png?v=1"
				alt="48 Coffee"
				width="120"
				height="120"
				style="display:block;margin:0 auto 1.5rem;border-radius:1.5rem;"
			/>
			<h1>You're Offline</h1>
			<p>
				Connect to the internet to use the POS system. Cached data is still
				available.
			</p>
			<button onclick="window.location.reload()">Try Again</button>
		</div>
	</body>
</html>
